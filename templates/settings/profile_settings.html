{% extends 'base.html' %}

{% block title %}Profil Ayarları | GÖLGEDE YAŞAM{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-8 pb-12">
    <h2 class="text-2xl font-bold text-slate-900">Profil Ayarları</h2>

    <section class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm space-y-6">
        <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-4">Sol Alt Profil Kartı</h3>
        <form method="post" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            {% csrf_token %}
            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700">Profil Adı</label>
                {{ profile_form.sidebar_profile_name }}
            </div>
            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700">Profil Ünvanı</label>
                {{ profile_form.sidebar_profile_role }}
            </div>
            <div class="md:col-span-2 flex justify-end pt-2">
                <button type="submit" class="px-8 py-3 bg-brand-600 text-white rounded-xl font-bold hover:bg-brand-700 transition-all">
                    Kaydet
                </button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
