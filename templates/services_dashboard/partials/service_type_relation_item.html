{% load option_colors %}
<div class="option-item rounded-2xl border border-slate-100 bg-slate-50/80 overflow-hidden" data-option-id="{{ item.id }}">
    <div class="flex items-start gap-3 p-3">
        <span class="w-4 h-4 rounded-full shrink-0 ring-2 ring-white shadow-sm"
              style="background-color: {{ item|service_type_primary_color }};"></span>
        <div class="flex-1 min-w-0">
            <span class="text-sm font-bold text-slate-800 block truncate">{{ item.name }}</span>
            <span class="text-[10px] text-slate-400">{{ item.products.count }} ürüne bağlı</span>
            <div class="mt-1.5 flex flex-wrap gap-1.5">
                {% for p in item.products.all %}
                <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-md text-[10px] font-bold border"
                      style="background-color: {{ p.color_hex|option_badge_bg }}; color: {{ p.color_hex|option_badge_text }}; border-color: {{ p.color_hex|option_badge_border }};">
                    <span class="w-1.5 h-1.5 rounded-full" style="background-color: {{ p.color_hex }};"></span>
                    {{ p.name }}
                </span>
                {% empty %}
                <span class="text-[10px] text-slate-400">Henüz ürün bağlı değil</span>
                {% endfor %}
            </div>
        </div>
        <button type="button" class="option-edit-toggle p-2 text-slate-400 hover:text-brand-600 hover:bg-white rounded-lg transition-colors" title="Ürün ilişkileri">
            <i data-lucide="link-2" class="w-4 h-4"></i>
        </button>
        <form method="post" class="inline" onsubmit="return confirm('Silmek istediğinize emin misiniz?');">
            {% csrf_token %}
            <input type="hidden" name="{{ delete_action }}" value="1">
            <input type="hidden" name="id" value="{{ item.id }}">
            <button type="submit" class="p-2 text-slate-300 hover:text-red-500 hover:bg-white rounded-lg transition-colors" title="Sil">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
        </form>
    </div>
    <div class="option-edit-panel hidden border-t border-slate-100 bg-white p-4 space-y-3">
        <form method="post" class="space-y-3">
            {% csrf_token %}
            <input type="hidden" name="{{ update_action }}" value="1">
            <input type="hidden" name="id" value="{{ item.id }}">
            <details class="rounded-xl border border-slate-200 bg-slate-50" open>
                <summary class="list-none cursor-pointer px-3 py-2 text-xs font-bold text-slate-600 uppercase tracking-wide">
                    Bağlı ürünler ({{ item.products.count }} seçili)
                </summary>
                <div class="p-3 border-t border-slate-100">
                    <div class="max-h-40 overflow-y-auto grid grid-cols-1 gap-1.5 p-2 bg-white rounded-xl border border-slate-100">
                        {% for p in all_products %}
                        <label class="flex items-center gap-2 p-1.5 rounded-lg hover:bg-slate-50 cursor-pointer text-sm">
                            <input type="checkbox" name="product_ids" value="{{ p.id }}"
                                   {% if p in item.products.all %}checked{% endif %}
                                   class="rounded border-slate-300 text-brand-600">
                            <span class="w-2.5 h-2.5 rounded-full shrink-0" style="background-color: {{ p.color_hex }};"></span>
                            <span class="text-slate-700">{{ p.name }}</span>
                        </label>
                        {% endfor %}
                    </div>
                </div>
            </details>
            <button type="submit" class="w-full py-2.5 bg-brand-600 text-white rounded-xl text-sm font-bold hover:bg-brand-700 transition-colors">
                Ürün İlişkilerini Kaydet
            </button>
        </form>
    </div>
</div>
