{% load option_colors %}
{# item, option_type, update_action, delete_action, default_color #}
<div class="option-item rounded-2xl border border-slate-100 bg-slate-50/80 overflow-hidden" data-option-id="{{ item.id }}">
    <div class="flex items-center gap-3 p-3">
        <span class="w-4 h-4 rounded-full shrink-0 ring-2 ring-white shadow-sm"
              style="background-color: {{ item.color_hex }};"></span>
        <span class="text-sm font-bold text-slate-800 flex-1 min-w-0 truncate">{{ item.name }}</span>
        <button type="button" class="option-edit-toggle p-2 text-slate-400 hover:text-brand-600 hover:bg-white rounded-lg transition-colors"
                aria-expanded="false" title="Düzenle">
            <i data-lucide="pencil" class="w-4 h-4"></i>
        </button>
        <form method="post" class="inline" onsubmit="return confirm('Silmek istediğinize emin misiniz?');">
            {% csrf_token %}
            <input type="hidden" name="{{ delete_action }}" value="1">
            <input type="hidden" name="id" value="{{ item.id }}">
            <button type="submit" class="p-2 text-slate-300 hover:text-red-500 hover:bg-white rounded-lg transition-colors" title="Sil">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
        </form>
    </div>
    <div class="option-edit-panel hidden border-t border-slate-100 bg-white p-4 space-y-4">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <input type="hidden" name="{{ update_action }}" value="1">
            <input type="hidden" name="id" value="{{ item.id }}">
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">İsim</label>
                <input type="text" name="name" value="{{ item.name }}" required
                       class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium">
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">Renk</label>
                {% include 'services_dashboard/partials/color_picker.html' with value=item.color_hex field_name='color' %}
            </div>
            <button type="submit" class="w-full py-2.5 bg-brand-600 text-white rounded-xl text-sm font-bold hover:bg-brand-700 transition-colors">
                Kaydet
            </button>
        </form>
    </div>
</div>
