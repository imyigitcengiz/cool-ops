{% if site_settings.ai_chat_enabled %}
<div id="aiChatWrapper" class="fixed bottom-6 right-6 z-[100] flex flex-col items-end">
    <!-- Chat Window -->
    <div id="aiChatWindow" class="hidden w-[380px] h-[500px] bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col mb-4 animate-in slide-in-from-bottom-4 duration-300">
        <!-- Header -->
        <div class="p-4 bg-slate-900 text-white flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-brand-500 rounded-xl">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                </div>
                <div>
                    <p class="text-sm font-bold">GY Asistan</p>
                    <p class="text-[10px] text-slate-400">Çevrimiçi | Yapay Zeka</p>
                </div>
            </div>
            <button onclick="toggleAiChat()" class="text-slate-400 hover:text-white transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Messages Area -->
        <div id="aiChatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50">
            <div class="flex gap-2">
                <div class="w-8 h-8 rounded-full bg-brand-100 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="bot" class="w-4 h-4 text-brand-600"></i>
                </div>
                <div class="bg-white p-3 rounded-2xl rounded-tl-none border border-slate-100 shadow-sm max-w-[80%]">
                    <p class="text-xs text-slate-700">Merhaba! Ben GY Asistan. Size nasıl yardımcı olabilirim? Verileri analiz edebilir veya işlemlerinizde yardımcı olabilirim.</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t border-slate-100">
            <form id="aiChatForm" class="flex gap-2">
                <input type="text" id="aiChatMessageInput" placeholder="Mesajınızı yazın..." class="flex-1 bg-slate-50 border-none rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                <button type="submit" class="p-2 bg-brand-600 text-white rounded-xl hover:bg-brand-700 transition-all">
                    <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Toggle Button -->
    <button onclick="toggleAiChat()" class="w-14 h-14 bg-brand-600 text-white rounded-full shadow-xl shadow-brand-200 flex items-center justify-center hover:scale-110 transition-all group">
        <i data-lucide="message-square" id="aiChatIconNormal" class="w-6 h-6 group-hover:rotate-12 transition-transform"></i>
    </button>
</div>

<script>
    function toggleAiChat() {
        const window = document.getElementById('aiChatWindow');
        window.classList.toggle('hidden');
        if (!window.classList.contains('hidden')) {
            document.getElementById('aiChatMessageInput').focus();
        }
    }

    document.getElementById('aiChatForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('aiChatMessageInput');
        const message = input.value.trim();
        if (!message) return;

        // Add user message
        appendMessage('user', message);
        input.value = '';

        // Show typing indicator
        const typingId = appendMessage('bot', '<span class="flex gap-1"><span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></span><span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:0.2s]"></span><span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:0.4s]"></span></span>');

        try {
            const response = await fetch('{% url "ai_chat" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ message })
            });
            const data = await response.json();
            
            // Remove typing indicator and add response
            document.getElementById(typingId).remove();
            if (data.message) {
                appendMessage('bot', data.message);
            } else {
                appendMessage('bot', 'Bir hata oluştu: ' + (data.error || 'Bilinmeyen hata'));
            }
        } catch (error) {
            document.getElementById(typingId).remove();
            appendMessage('bot', 'Sunucuya bağlanılamadı.');
        }
    });

    function appendMessage(sender, text) {
        const container = document.getElementById('aiChatMessages');
        const id = 'msg-' + Math.random().toString(36).substr(2, 9);
        const div = document.createElement('div');
        div.id = id;
        div.className = 'flex gap-2 ' + (sender === 'user' ? 'flex-row-reverse' : '');
        
        const icon = sender === 'user' ? 'user' : 'bot';
        const color = sender === 'user' ? 'slate' : 'brand';
        
        div.innerHTML = `
            <div class="w-8 h-8 rounded-full bg-${color}-100 flex items-center justify-center flex-shrink-0">
                <i data-lucide="${icon}" class="w-4 h-4 text-${color}-600"></i>
            </div>
            <div class="bg-${sender === 'user' ? 'brand-600 text-white' : 'white text-slate-700'} p-3 rounded-2xl ${sender === 'user' ? 'rounded-tr-none' : 'rounded-tl-none'} border border-slate-100 shadow-sm max-w-[80%]">
                <p class="text-xs whitespace-pre-wrap">${text}</p>
            </div>
        `;
        
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        lucide.createIcons();
        return id;
    }

    // CSRF helper to read cookie
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
    }
</script>
{% endif %}
