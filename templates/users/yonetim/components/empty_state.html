<div class="rounded-3xl border border-dashed border-slate-200 bg-white p-10 text-center">
    {% if icon %}<i data-lucide="{{ icon }}" class="w-10 h-10 mx-auto text-slate-300 mb-3"></i>{% endif %}
    <p class="text-slate-600 font-medium">{{ message }}</p>
    {% if hint %}<p class="text-sm text-slate-400 mt-2">{{ hint }}</p>{% endif %}
</div>
