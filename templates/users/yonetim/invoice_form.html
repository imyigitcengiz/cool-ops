{% extends 'users/yonetim/base.html' %}
{% block title %}Yeni fatura{% endblock %}
{% block content %}
<div class="mb-6"><h1 class="text-2xl font-bold text-slate-900">Manuel fatura kaydı</h1></div>
<form method="post" class="bg-white rounded-3xl border border-slate-200 p-6 space-y-4 max-w-xl">
    {% csrf_token %}
    <div><label class="text-sm font-semibold text-slate-700">Kullanıcı</label><div class="mt-1">{{ form.user }}</div></div>
    <div><label class="text-sm font-semibold text-slate-700">Plan</label><div class="mt-1">{{ form.plan }}</div></div>
    <div><label class="text-sm font-semibold text-slate-700">Tutar (₺)</label><div class="mt-1">{{ form.amount }}</div></div>
    <div><label class="text-sm font-semibold text-slate-700">Durum</label><div class="mt-1">{{ form.status }}</div></div>
    <div class="flex gap-3 pt-2">
        <a href="{% url 'admin_invoices' %}" class="px-5 py-2.5 rounded-xl bg-slate-200 text-slate-700 font-bold">Vazgeç</a>
        <button type="submit" class="px-5 py-2.5 rounded-xl bg-red-600 text-white font-bold">Kaydet</button>
    </div>
</form>
{% endblock %}
