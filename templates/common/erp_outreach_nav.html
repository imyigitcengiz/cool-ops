{% with url_name=request.resolver_match.url_name %}
<a href="{% url 'outreach_hub' %}" class="erp-nav-link{% if url_name == 'outreach_hub' %} erp-nav-link--active{% endif %}">

</a>
{% if modules_nav.integration_bulk_messaging %}
