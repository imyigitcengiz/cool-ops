{# Entegrasyonlar — WhatsApp, kazıma, medya #}
{% if panel_integrations %}
<section class="mb-10">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <h3 class="text-xs font-bold uppercase tracking-wider text-amber-700 flex items-center gap-2">
            <i data-lucide="zap" class="w-4 h-4"></i> Entegrasyonlar
        </h3>
        <a href="{{ capabilities_hub_url }}" class="text-xs font-bold text-amber-600 hover:text-amber-800">Entegrasyon merkezi →</a>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
        {% for mod in panel_integrations %}
        <a href="{{ mod.open_url }}" class="group block bg-white rounded-2xl border border-amber-100 shadow-sm hover:shadow-md hover:border-amber-300 transition-all p-5">
            <div class="w-10 h-10 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center mb-3 group-hover:bg-amber-500 group-hover:text-white transition-colors">
                <i data-lucide="{{ mod.icon }}" class="w-5 h-5"></i>
            </div>
            <h4 class="font-bold text-slate-900 text-sm">{{ mod.name }}</h4>
            <p class="text-xs text-slate-500 mt-1 line-clamp-2">{{ mod.summary }}</p>
        </a>
        {% endfor %}
    </div>
</section>
{% endif %}
