{# Platform — modül / entegrasyon merkezi #}
{% with url_name=request.resolver_match.url_name %}
<div class="erp-sidebar-platform-grid">
    {% if can_manage_modules %}
    <a href="{% url 'module_hub' %}" class="erp-sidebar-platform-card{% if url_name == 'module_hub' %} erp-sidebar-platform-card--active{% endif %}">
        <span class="erp-sidebar-platform-card__icon" aria-hidden="true">
            <i data-lucide="puzzle"></i>
        </span>
        <span class="erp-sidebar-platform-card__text">
            <span class="erp-sidebar-platform-card__title">{{ gy.modul_merkezi }}</span>
            <span class="erp-sidebar-platform-card__hint">Aç / kapa</span>
        </span>
    </a>
    {% endif %}
    {% if panel_integrations or can_manage_modules %}
    <a href="{% url 'capabilities_hub' %}" class="erp-sidebar-platform-card{% if url_name == 'capabilities_hub' %} erp-sidebar-platform-card--active{% endif %}">
        <span class="erp-sidebar-platform-card__icon erp-sidebar-platform-card__icon--amber" aria-hidden="true">
            <i data-lucide="zap"></i>
        </span>
        <span class="erp-sidebar-platform-card__text">
            <span class="erp-sidebar-platform-card__title">{{ gy.entegrasyon_merkezi }}</span>
            <span class="erp-sidebar-platform-card__hint">Bağlantılar</span>
        </span>
    </a>
    {% endif %}
</div>
{% endwith %}
