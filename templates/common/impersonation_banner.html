{% if impersonation_active %}
<div class="impersonation-banner sticky top-0 z-[60] bg-amber-500 text-amber-950 border-b border-amber-600 shadow-md">
    <div class="max-w-[1600px] mx-auto px-4 md:px-8 py-2.5 flex flex-wrap items-center justify-between gap-3">
        <div class="flex items-start sm:items-center gap-2 min-w-0">
            <i data-lucide="eye" class="w-5 h-5 shrink-0 mt-0.5 sm:mt-0"></i>
            <p class="text-sm font-semibold leading-snug">
                <span class="font-black">Kullanıcı görünümü:</span>
                {{ impersonation_target.display_name }}
                <span class="opacity-80">· {{ impersonation_target.role_label }}</span>
                {% if impersonation_actor %}
                <span class="hidden sm:inline opacity-80">— Süper admin: {{ impersonation_actor.display_name }}</span>
                {% endif %}
            </p>
        </div>
        <form method="post" action="{% url 'impersonate_stop' %}" class="shrink-0">
            {% csrf_token %}
            <button type="submit" class="px-4 py-2 rounded-xl bg-amber-950 text-amber-50 text-sm font-bold hover:bg-black transition-colors">
                Süper admin oturumuna dön
            </button>
        </form>
    </div>
</div>
{% endif %}
