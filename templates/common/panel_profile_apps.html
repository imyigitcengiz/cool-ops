{# Kurulu modüller — panel kısayolları #}
{% if panel_modules %}
<section class="erp-panel-section mb-10">
    <h3 class="erp-panel-section__title">
        <i data-lucide="layout-grid" class="w-4 h-4"></i>
        Modüller
    </h3>
    <div class="erp-panel-grid erp-panel-grid--modules">
        {% for mod in panel_modules %}
        <a href="{{ mod.open_url }}" class="erp-panel-card">
            <span class="erp-panel-card__icon" aria-hidden="true">
                <i data-lucide="{{ mod.icon }}" class="w-6 h-6"></i>
            </span>
            <span class="erp-panel-card__body">
                <span class="erp-panel-card__title">{{ mod.name }}</span>
                <span class="erp-panel-card__desc">{{ mod.summary }}</span>
            </span>
            <i data-lucide="chevron-right" class="erp-panel-card__arrow w-5 h-5 text-slate-300"></i>
        </a>
        {% endfor %}
    </div>
</section>
{% endif %}
