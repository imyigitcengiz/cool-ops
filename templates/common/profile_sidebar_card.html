<div class="erp-sidebar-profile">
    {% if user.is_authenticated and user_profile_card %}
    <a href="{% url 'profile_settings' %}" class="erp-sidebar-profile__link{% if request.resolver_match.url_name == 'profile_settings' %} erp-sidebar-profile__link--active{% endif %}">
        <span class="erp-sidebar-profile__avatar">
            {% if user_profile_card.avatar_url %}
            <img src="{{ user_profile_card.avatar_url }}" alt="">
            {% else %}
            <span class="erp-sidebar-profile__initials">{{ user_profile_card.initials }}</span>
            {% endif %}
        </span>
        <span class="erp-sidebar-profile__meta">
            <span class="erp-sidebar-profile__name">{{ user_profile_card.display_name }}</span>
            <span class="erp-sidebar-profile__role">{{ user_profile_card.subtitle }}</span>
        </span>
        <i data-lucide="chevron-right" class="erp-sidebar-profile__chevron w-4 h-4"></i>
    </a>
    <form method="post" action="{% url 'logout' %}" class="erp-sidebar-profile__logout">
        {% csrf_token %}
        <button type="submit">Oturumu kapat</button>
    </form>
    {% else %}
    <a href="{% url 'login' %}?next={{ request.path|urlencode }}" class="erp-sidebar-profile__link">
        <span class="erp-sidebar-profile__avatar">
            <i data-lucide="log-in" class="w-5 h-5 text-slate-400"></i>
        </span>
        <span class="erp-sidebar-profile__meta">
            <span class="erp-sidebar-profile__name">Giriş yap</span>
            <span class="erp-sidebar-profile__role">Profil ve oturum</span>
        </span>
    </a>
    {% endif %}
</div>
