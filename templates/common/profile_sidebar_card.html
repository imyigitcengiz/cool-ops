<div class="p-4 border-t border-slate-800">
    {% if user.is_authenticated and user_profile_card %}
    <a href="{% url 'profile_settings' %}" class="flex items-center justify-between gap-3 px-2 py-2 rounded-xl hover:bg-slate-800/70 transition-colors group {% if request.resolver_match.url_name == 'profile_settings' %}bg-slate-800/60{% endif %}">
        <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center flex-shrink-0 overflow-hidden ring-2 ring-slate-700 group-hover:ring-brand-500/50 transition-all">
            {% if user_profile_card.avatar_url %}
            <img src="{{ user_profile_card.avatar_url }}" alt="" class="w-full h-full object-cover">
            {% else %}
            <span class="text-xs font-bold text-white">{{ user_profile_card.initials }}</span>
            {% endif %}
        </div>
        <div class="min-w-0 flex-1">
            <p class="text-sm font-medium text-white truncate">{{ user_profile_card.display_name }}</p>
            <p class="text-xs text-slate-500 truncate">{{ user_profile_card.subtitle }}</p>
        </div>
        <i data-lucide="settings" class="w-4 h-4 text-slate-500 group-hover:text-slate-300 shrink-0"></i>
    </a>
    <form method="post" action="{% url 'logout' %}" class="mt-1 px-2">
        {% csrf_token %}
        <button type="submit" class="w-full text-left text-[11px] font-semibold text-slate-500 hover:text-slate-300 py-1.5 px-2 rounded-lg hover:bg-slate-800/50">
            Oturumu kapat
        </button>
    </form>
    {% else %}
    <a href="{% url 'login' %}?next={{ request.path|urlencode }}" class="flex items-center gap-3 px-2 py-2 rounded-xl hover:bg-slate-800/70 transition-colors">
        <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center flex-shrink-0">
            <i data-lucide="log-in" class="w-5 h-5 text-slate-400"></i>
        </div>
        <div class="min-w-0 flex-1">
            <p class="text-sm font-medium text-white">Giriş yap</p>
            <p class="text-xs text-slate-500">Profil ve oturum</p>
        </div>
    </a>
    {% endif %}
</div>
