{% if user.is_authenticated %}
<div id="erpQuickSearchModal" class="hidden fixed inset-0 z-[100] flex items-start justify-center p-4 sm:pt-[12vh]" role="dialog" aria-modal="true" aria-labelledby="erpQuickSearchTitle">
    <div id="erpQuickSearchBackdrop" class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm"></div>
    <div class="relative w-full max-w-xl bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
        <div class="flex items-center gap-3 px-4 py-3 border-b border-slate-100">
            <i data-lucide="search" class="w-5 h-5 text-slate-400 shrink-0"></i>
            <input id="erpQuickSearchInput" type="search" autocomplete="off" placeholder="Sayfa, müşteri, firma veya telefon ara…" class="flex-1 text-sm outline-none placeholder:text-slate-400" aria-labelledby="erpQuickSearchTitle">
            <kbd class="hidden sm:inline text-[10px] font-bold text-slate-400 border border-slate-200 rounded px-1.5 py-0.5">Esc</kbd>
        </div>
        <p id="erpQuickSearchTitle" class="sr-only">Hızlı arama</p>
        <div id="erpQuickSearchResults" class="max-h-[min(60vh,24rem)] overflow-y-auto p-2">
            <p class="px-3 py-6 text-center text-sm text-slate-400">Yazmaya başlayın veya / tuşuna basın</p>
        </div>
        <div class="px-4 py-2 border-t border-slate-100 bg-slate-50 text-[11px] text-slate-500 flex flex-wrap gap-x-3 gap-y-1">
            <span><kbd class="font-bold">↑↓</kbd> seç</span>
            <span><kbd class="font-bold">Enter</kbd> git</span>
            <span><kbd class="font-bold">/</kbd> aç</span>
        </div>
    </div>
</div>
{% endif %}
