{% if user.is_authenticated and user_brands %}
<div class="erp-brand-switcher relative" data-erp-brand-switcher>
    <button type="button"
            class="erp-brand-switcher__btn flex items-center gap-2 px-2.5 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-700 hover:bg-slate-50 text-sm font-semibold max-w-[12rem] sm:max-w-[14rem]"
            aria-expanded="false"
            aria-haspopup="listbox"
            data-erp-brand-toggle>
        {% if active_brand and active_brand.logo %}
        <img src="{{ active_brand.logo.url }}" alt="" class="w-6 h-6 rounded-lg object-cover shrink-0">
        {% else %}
        <span class="w-6 h-6 rounded-lg bg-brand-100 text-brand-800 flex items-center justify-center text-[10px] font-black shrink-0">
            {% if active_brand %}{{ active_brand.name|slice:":2"|upper }}{% else %}{{ site_settings.site_name|slice:":2"|upper }}{% endif %}
        </span>
        {% endif %}
        <span class="truncate">{% if active_brand %}{{ active_brand.name }}{% else %}{{ site_settings.site_name }}{% endif %}</span>
        <i data-lucide="chevron-down" class="w-4 h-4 shrink-0 text-slate-400"></i>
    </button>
    <div class="erp-brand-switcher__menu hidden absolute right-0 top-full mt-1 min-w-[12rem] z-50 bg-white border border-slate-200 rounded-xl shadow-lg py-1"
         role="listbox"
         data-erp-brand-menu>
        {% if has_multiple_brands %}
        {% for b in user_brands %}
        <form method="post" action="{% url 'brand_switch' %}" class="block">
            {% csrf_token %}
            <input type="hidden" name="brand_id" value="{{ b.pk }}">
            <input type="hidden" name="next" value="{{ request.get_full_path }}">
            <button type="submit"
                    class="w-full text-left px-3 py-2 text-sm font-medium flex items-center gap-2 hover:bg-slate-50 {% if active_brand and active_brand.pk == b.pk %}text-brand-700 bg-brand-50/80{% else %}text-slate-700{% endif %}">
                {% if b.logo %}
                <img src="{{ b.logo.url }}" alt="" class="w-5 h-5 rounded object-cover">
                {% else %}
                <span class="w-5 h-5 rounded bg-slate-100 text-[9px] font-bold flex items-center justify-center">{{ b.name|slice:":2"|upper }}</span>
                {% endif %}
                <span class="truncate flex-1">{{ b.name }}</span>
                {% if active_brand and active_brand.pk == b.pk %}
                <i data-lucide="check" class="w-4 h-4 shrink-0"></i>
                {% endif %}
            </button>
        </form>
        {% endfor %}
        <div class="border-t border-slate-100 mt-1 pt-1"></div>
        {% endif %}
        <a href="{% url 'subscription_dashboard' %}"
           class="block px-3 py-2 text-xs font-semibold text-slate-500 hover:text-brand-700 hover:bg-slate-50">
            Abonelik & bayi yönetimi…
        </a>
    </div>
</div>
<script>
(function () {
    document.querySelectorAll('[data-erp-brand-switcher]').forEach(function (root) {
        var btn = root.querySelector('[data-erp-brand-toggle]');
        var menu = root.querySelector('[data-erp-brand-menu]');
        if (!btn || !menu) return;
        btn.addEventListener('click', function (e) {
            e.stopPropagation();
            var open = !menu.classList.contains('hidden');
            document.querySelectorAll('[data-erp-brand-menu]').forEach(function (m) { m.classList.add('hidden'); });
            if (!open) {
                menu.classList.remove('hidden');
                btn.setAttribute('aria-expanded', 'true');
            } else {
                btn.setAttribute('aria-expanded', 'false');
            }
        });
        document.addEventListener('click', function () {
            menu.classList.add('hidden');
            btn.setAttribute('aria-expanded', 'false');
        });
    });
})();
</script>
{% endif %}
