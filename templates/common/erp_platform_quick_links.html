{# Ana panel — kısayol şeridi (modül kartlarıyla tekrar etmez) #}
<nav class="erp-platform-quick-links mb-8 md:mb-10" aria-label="Kısayollar">
    {% if user_access.settings %}
    <a href="{% url 'settings_genel' %}" class="erp-platform-quick-links__item">
        <i data-lucide="sliders-horizontal" class="w-4 h-4"></i> {{ gy.site_ayarlari }}
    </a>
    {% endif %}
    {% if can_manage_modules %}
    <a href="{% url 'module_hub' %}" class="erp-platform-quick-links__item">
        <i data-lucide="puzzle" class="w-4 h-4"></i> {{ gy.modul_merkezi }}
    </a>
    {% endif %}
    {% if panel_integrations or can_manage_modules %}
    <a href="{% url 'capabilities_hub' %}" class="erp-platform-quick-links__item erp-platform-quick-links__item--accent">
        <i data-lucide="zap" class="w-4 h-4"></i> {{ gy.entegrasyon_merkezi }}
    </a>
    {% endif %}
    <a href="{% url 'introducer_knowledge_base' %}" class="erp-platform-quick-links__item">
        <i data-lucide="book-open" class="w-4 h-4"></i> Bilgi bankası
    </a>
</nav>
