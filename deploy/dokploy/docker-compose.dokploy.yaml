# Dokploy: Traefik domain yönetimi — host ports açmayın.
# Dokploy UI → Domains → servis "app" → container port 80, HTTPS kapalı (sslip.io).
#
# 404 alıyorsanız: app servisi dokploy-network'te olmalı + traefik.docker.network etiketi.
#
# Kullanım (SSH test):
#   COMPOSE_FILE=docker-compose.yaml:deploy/dokploy/docker-compose.dokploy.yaml docker compose up -d --build
#
# Dokploy Compose projesinde ortam değişkeni (isteğe bağlı):
#   COMPOSE_FILE=docker-compose.yaml:deploy/dokploy/docker-compose.dokploy.yaml
name: cool-ops

services:
  app:
    networks:
      - default
      - dokploy-network
    ports:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
    environment:
      COOLOPS_COMPOSE_STACK: "1"

networks:
  dokploy-network:
    external: true
