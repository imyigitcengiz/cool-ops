# Yerel geliştirme — yalnızca PostgreSQL (runserver host'ta çalışır)
# Kullanım: docker compose -f deploy/docker-compose.postgres-dev.yaml up -d
name: kobi-ops-postgres-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kobiops}
      POSTGRES_USER: ${POSTGRES_USER:-kobiops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kobiops_local_dev}
    volumes:
      - kobiops_postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-kobiops} -d $${POSTGRES_DB:-kobiops}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  kobiops_postgres_dev:
    name: kobiops_postgres_dev
