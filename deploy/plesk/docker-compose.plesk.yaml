# Plesk: ana compose yalnızca expose kullanır — bu overlay host portunu açar.
# nginx/apache → http://127.0.0.1:8000 (KOBIOPS_HTTP_PORT ile değiştirilebilir)
# Kullanım: COMPOSE_FILE=docker-compose.yaml:deploy/plesk/docker-compose.plesk.yaml
# deploy/plesk/deploy.sh bunu otomatik ayarlar.
name: kobi-ops

services:
  app:
    ports:
      - "127.0.0.1:${KOBIOPS_HTTP_PORT:-8000}:80"
    environment:
      COOLOPS_COMPOSE_STACK: "1"
      KOBIOPS_COMPOSE_STACK: "1"
      SERVICE_FQDN_APP: ${KOBIOPS_DOMAIN:-}
      SERVICE_URL_APP: ${KOBIOPS_PUBLIC_URL:-}
