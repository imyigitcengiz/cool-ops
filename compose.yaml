# GY Panel — panel + WhatsApp köprüsü (Coolify, 1Panel, Railway, ham Docker)
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      WHATSAPP_BRIDGE_URL: http://whatsapp-bridge:3939
      DJANGO_WHATSAPP_BRIDGE_CAN_SPAWN: "0"
      DJANGO_WHATSAPP_BRIDGE_AUTO_START: "0"
    volumes:
      - gy_data:/data
    depends_on:
      whatsapp-bridge:
        condition: service_healthy

  whatsapp-bridge:
    build:
      context: .
      dockerfile: deploy/whatsapp-bridge/Dockerfile
    restart: unless-stopped
    expose:
      - "3939"
    volumes:
      - whatsapp_session:/app/session

volumes:
  gy_data:
  whatsapp_session:
